app:
  name: "PDF Knowledge Assistant"
  version: "1.0.0"
  debug: true

pdf:
  max_size_mb: 100
  allowed_extensions: [".pdf"]
  extraction:
    use_pdfplumber: true
    fallback_pypdf: true

chunking:
  chunk_size: 500
  chunk_overlap: 100
  min_chunk_size: 50

embeddings:
  model: "nomic-embed-text"
  dimension: 768
  ollama_endpoint: "http://localhost:11434"
  batch_size: 100

chromadb:
  collection_name: "company_documents"
  persist_directory: "./chroma_db"
  batch_size: 100

llm:
  model: "mistral"
  temperature: 0.1
  max_tokens: 500
  timeout_seconds: 30

search:
  top_k: 5
  similarity_threshold: 0.3
  use_metadata_filters: true

logging:
  level: "INFO"
  file: "./logs/app.log"
  max_size_mb: 100
  backup_count: 5
